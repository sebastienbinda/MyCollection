name: cloudcollectionapp

services:
  traefik:
    image: traefik:v3.7
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Redirection HTTP -> HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Let's Encrypt
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL:?LETSENCRYPT_EMAIL doit etre defini}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - traefik_letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - frontend
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    environment:
      APP_HOME_TITLE: ${APP_HOME_TITLE:-Ma collection}
      BACKEND_PORT: "7777"
      JEUXVIDEO_ODS_PATH: /project/collection.ods
      JEUXVIDEO_ODS_TMP_DIR: /project/tmp
      JEUXVIDEO_ODS_BACKUP_DIR: /project/backup
      ODS_FORMULA_RECALCULATION: required
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-3600}
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_ENV_ENCRYPTION_KEY: ${AUTH_ENV_ENCRYPTION_KEY:-}
      AUTH_PASSWORD_ENCRYPTED: ${AUTH_PASSWORD_ENCRYPTED:-}
      AUTH_SECRET_KEY_ENCRYPTED: ${AUTH_SECRET_KEY_ENCRYPTED:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-cloudcollectionapp}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD doit etre defini}@database:5432/${POSTGRES_DB:-cloudcollectionapp}
    volumes:
      - ${JEUXVIDEO_ODS_FILE:-../collection-example.ods}:/project/collection.ods
      - ${JEUXVIDEO_BACKUP_DIR:-../backup}:/project/backup
    tmpfs:
      - /project/tmp
    expose:
      - "7777"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - frontend
      - backend_data
    restart: unless-stopped

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cloudcollectionapp}
      POSTGRES_USER: ${POSTGRES_USER:-cloudcollectionapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD doit etre defini}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_data
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    depends_on:
      - backend
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cloudcollection.rule=Host(`${DNS_NAME}`) || Host(`www.${DNS_NAME}`)"
      - "traefik.http.routers.cloudcollection.entrypoints=websecure"
      - "traefik.http.routers.cloudcollection.tls=true"
      - "traefik.http.routers.cloudcollection.tls.certresolver=letsencrypt"
      - "traefik.http.services.cloudcollection.loadbalancer.server.port=80"
    networks:
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  traefik_letsencrypt:

networks:
  frontend:
  backend_data:
    internal: true