name: monprojet

services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    environment:
      BACKEND_PORT: "7777"
      JEUXVIDEO_ODS_PATH: /data/${JEUXVIDEO_ODS_FILENAME:-JeuxVideo-v2.ods}
    volumes:
      - ${JEUXVIDEO_ODS_HOST_DIR:-/Users/sebastien/Documents}:/data
    expose:
      - "7777"
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-8080}:80"
    restart: unless-stopped
