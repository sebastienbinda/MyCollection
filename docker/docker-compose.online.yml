name: cloudcollectionapp

services:
  traefik:
    image: traefik:v3.7
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL:?LETSENCRYPT_EMAIL doit etre defini}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - traefik_letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - frontend
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    environment:
      APP_HOME_TITLE: ${APP_HOME_TITLE:-Ma collection}
      BACKEND_PORT: "7777"
      JEUXVIDEO_ODS_PATH: /project/collection.ods
      JEUXVIDEO_ODS_TMP_DIR: /project/tmp
      JEUXVIDEO_ODS_BACKUP_DIR: /project/backup
      ODS_FORMULA_RECALCULATION: required
      BACKEND_LOG_LEVEL: ${BACKEND_LOG_LEVEL:-INFO}
      BACKEND_LOG_FILE_ENABLED: ${BACKEND_LOG_FILE_ENABLED:-true}
      BACKEND_LOG_DIR: /app/logs
      BACKEND_LOG_FILE_NAME: ${BACKEND_LOG_FILE_NAME:-backend.log}
      BACKEND_LOG_FILE_MAX_BYTES: ${BACKEND_LOG_FILE_MAX_BYTES:-10485760}
      BACKEND_LOG_FILE_BACKUP_COUNT: ${BACKEND_LOG_FILE_BACKUP_COUNT:-30}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-3600}
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_ENV_ENCRYPTION_KEY: ${AUTH_ENV_ENCRYPTION_KEY:-}
      AUTH_PASSWORD_ENCRYPTED: ${AUTH_PASSWORD_ENCRYPTED:-}
      AUTH_SECRET_KEY_ENCRYPTED: ${AUTH_SECRET_KEY_ENCRYPTED:-}
      APP_VERSION: ${APP_VERSION:-0.1}
      DB_SCHEMA_NAME: ${DB_SCHEMA_NAME:-cloudcollectionapp}
      DATABASE_URL: ${DATABASE_URL:-}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-https://${DNS_NAME}}
      EMAIL_DELIVERY_MODE: ${EMAIL_DELIVERY_MODE:-smtp}
      EMAIL_VERIFICATION_TOKEN_TTL_HOURS: ${EMAIL_VERIFICATION_TOKEN_TTL_HOURS:-24}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:?SMTP_FROM_EMAIL doit etre defini}
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST doit etre defini}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
    volumes:
      - ${JEUXVIDEO_ODS_FILE:-../collection-example.ods}:/project/collection.ods
      - ${JEUXVIDEO_BACKUP_DIR:-../backup}:/project/backup
      - ${BACKEND_LOG_HOST_DIR:-../logs}:/app/logs
    tmpfs:
      - /project/tmp
    expose:
      - "7777"
    networks:
      - frontend
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    depends_on:
      - backend
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cloudcollection.rule=Host(`${DNS_NAME}`) || Host(`www.${DNS_NAME}`)"
      - "traefik.http.routers.cloudcollection.entrypoints=websecure"
      - "traefik.http.routers.cloudcollection.tls=true"
      - "traefik.http.routers.cloudcollection.tls.certresolver=letsencrypt"
      - "traefik.http.services.cloudcollection.loadbalancer.server.port=80"
    networks:
      - frontend
    restart: unless-stopped

volumes:
  traefik_letsencrypt:

networks:
  frontend:
