name: CI

on:
  push:
    branches:
      - main
    tags:
      - "*"

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  change-detection:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          backend_changed=false
          frontend_changed=false

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            backend_changed=true
            frontend_changed=true
          else
            before="${{ github.event.before }}"
            after="${{ github.sha }}"

            if [[ -z "${before}" || "${before}" == "0000000000000000000000000000000000000000" ]]; then
              changed_files="$(git diff-tree --no-commit-id --name-only -r "${after}")"
            else
              changed_files="$(git diff --name-only "${before}" "${after}")"
            fi

            if grep -Eq '^(backend/|test_backend\.sh|docker/backend\.Dockerfile|\.github/workflows/ci\.yml)$' <<< "${changed_files}"; then
              backend_changed=true
            fi

            if grep -Eq '^(frontend/|docker/frontend\.Dockerfile|\.github/workflows/ci\.yml)$' <<< "${changed_files}"; then
              frontend_changed=true
            fi
          fi

          echo "backend=${backend_changed}" >> "${GITHUB_OUTPUT}"
          echo "frontend=${frontend_changed}" >> "${GITHUB_OUTPUT}"

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    needs:
      - change-detection
    if: needs.change-detection.outputs.backend == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run backend tests
        run: ./test_backend.sh

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    needs:
      - change-detection
    if: needs.change-detection.outputs.frontend == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker-images:
    name: Build and publish Docker images
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && needs.backend-tests.result == 'success' && needs.frontend-build.result == 'success'
    needs:
      - backend-tests
      - frontend-build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve Docker image version from tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          resolved_version="${GITHUB_REF_NAME}"
          if [[ ! "${resolved_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Docker images are only published for tags matching X.Y.Z." >&2
            exit 1
          fi

          repository="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "version=${resolved_version}" >> "${GITHUB_OUTPUT}"
          echo "backend_image=${REGISTRY}/${repository}/backend" >> "${GITHUB_OUTPUT}"
          echo "frontend_image=${REGISTRY}/${repository}/frontend" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/backend.Dockerfile
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          push: true
          tags: |
            ${{ steps.version.outputs.backend_image }}:${{ steps.version.outputs.version }}
            ${{ steps.version.outputs.backend_image }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/frontend.Dockerfile
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          push: true
          tags: |
            ${{ steps.version.outputs.frontend_image }}:${{ steps.version.outputs.version }}
            ${{ steps.version.outputs.frontend_image }}:latest
