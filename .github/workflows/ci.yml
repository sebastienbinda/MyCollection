name: CI

on:
  push:
    branches:
      - main
    tags:
      - "*"

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run backend tests
        run: ./test_backend.sh

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker-images:
    name: Build and publish Docker images
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - backend-tests
      - frontend-build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Docker image version from tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          resolved_version="${GITHUB_REF_NAME}"
          if [[ ! "${resolved_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Docker images are only published for tags matching X.Y.Z." >&2
            exit 1
          fi

          repository="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "version=${resolved_version}" >> "${GITHUB_OUTPUT}"
          echo "backend_image=${REGISTRY}/${repository}/backend" >> "${GITHUB_OUTPUT}"
          echo "frontend_image=${REGISTRY}/${repository}/frontend" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: |
            ${{ steps.version.outputs.backend_image }}:${{ steps.version.outputs.version }}
            ${{ steps.version.outputs.backend_image }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: true
          tags: |
            ${{ steps.version.outputs.frontend_image }}:${{ steps.version.outputs.version }}
            ${{ steps.version.outputs.frontend_image }}:latest
